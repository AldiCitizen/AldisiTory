name: Lecture 3 Custom Action and Docker Pipeline

on:
  push:
    branches:
      - main

jobs:
  run_custom_and_docker:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Fetch your project code onto the cloud runner
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Run your local JavaScript custom action natively
      - name: Execute Custom Action
        uses: ./
        with:
          who-to-greet: 'AldiCitizen'

      # Step 3: Set up Docker build engine on the runner (Slide 31)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 4: Build the container image from your Dockerfile (Slide 32)
      - name: Build Docker Image
        run: docker build -t my-custom-app .

      # Step 5: Boot up and run your isolated application container (Slide 33)
      - name: Run Docker Container
        run: docker run my-custom-app
